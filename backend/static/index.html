<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabio Valentini — Strategy Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  header span { font-size: 12px; background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; padding: 2px 8px; border-radius: 12px; }

  .main { max-width: 1200px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }

  .panel { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 10px; padding: 20px; }
  .panel h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; margin-bottom: 16px; }

  label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; margin-top: 12px; }
  label:first-of-type { margin-top: 0; }
  input, select { width: 100%; background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; color: #e2e8f0; padding: 8px 10px; font-size: 13px; outline: none; }
  input:focus, select:focus { border-color: #6366f1; }

  .btn { width: 100%; margin-top: 20px; padding: 10px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn:hover { background: #4f46e5; }
  .btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
  .btn.loading::after { content: ' ⏳'; }

  .right { display: flex; flex-direction: column; gap: 20px; }

  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .metric { background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; padding: 14px; }
  .metric .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .metric .value { font-size: 22px; font-weight: 700; }
  .metric .sub { font-size: 11px; color: #64748b; margin-top: 2px; }
  .green { color: #22c55e; }
  .red { color: #ef4444; }
  .yellow { color: #f59e0b; }
  .white { color: #fff; }

  .benchmark-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2d314820; font-size: 13px; }
  .benchmark-row:last-child { border-bottom: none; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.ok { background: #22c55e22; color: #22c55e; }
  .badge.fail { background: #ef444422; color: #ef4444; }
  .badge.na { background: #37415122; color: #6b7280; }

  .chart-wrap { position: relative; height: 220px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 8px 10px; color: #64748b; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; font-size: 11px; border-bottom: 1px solid #2d3148; }
  td { padding: 8px 10px; border-bottom: 1px solid #2d314820; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #ffffff06; }
  .tag { padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .tag.long { background: #22c55e22; color: #22c55e; }
  .tag.short { background: #ef444422; color: #ef4444; }
  .tag.target { background: #6366f122; color: #818cf8; }
  .tag.stop { background: #ef444422; color: #ef4444; }
  .tag.eod { background: #f59e0b22; color: #f59e0b; }

  .placeholder { text-align: center; padding: 48px 20px; color: #374151; }
  .placeholder svg { width: 48px; height: 48px; margin: 0 auto 12px; display: block; opacity: .3; }

  .error-box { background: #ef444410; border: 1px solid #ef444430; border-radius: 8px; padding: 12px 16px; color: #fca5a5; font-size: 13px; }

  .info-row { display: flex; gap: 8px; font-size: 12px; color: #64748b; margin-top: 8px; }
  .info-row span { background: #2d314840; padding: 2px 8px; border-radius: 4px; }

  @media (max-width: 900px) { .main { grid-template-columns: 1fr; } .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 17l4-8 4 4 4-6 4 10" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <h1>Fabio Valentini — Auction Market Simulator</h1>
  <span>Trend + Mean Reversion</span>
</header>

<div class="main">
  <!-- LEFT: Config -->
  <div class="panel">
    <h2>Parametry Backtestu</h2>

    <label>Symbol</label>
    <select id="symbol">
      <option value="QQQ">QQQ (NASDAQ proxy)</option>
      <option value="SPY">SPY (S&P 500)</option>
      <option value="IWM">IWM (Russell 2000)</option>
    </select>

    <label>Interwał</label>
    <select id="interval">
      <option value="5min">5 minut</option>
      <option value="15min">15 minut</option>
      <option value="1min">1 minuta</option>
    </select>

    <label>Od</label>
    <input type="date" id="from_dt" value="2024-10-01">

    <label>Do</label>
    <input type="date" id="to_dt" value="2024-12-31">

    <label>Kapitał (USD)</label>
    <input type="number" id="account_size" value="100000" step="10000">

    <label>Ryzyko / trade</label>
    <select id="risk">
      <option value="0.0025">0.25% (własny kapital)</option>
      <option value="0.005">0.50% (prop firm)</option>
    </select>

    <label>Min R:R</label>
    <input type="number" id="min_rr" value="1.5" step="0.1" min="1">

    <label>Max straty / dzień</label>
    <input type="number" id="max_daily_losses" value="3" min="1" max="10">

    <label>Tryb</label>
    <select id="walk_forward">
      <option value="false">Pojedyncze okno</option>
      <option value="true">Walk-forward (3M okna)</option>
    </select>

    <button class="btn" id="runBtn" onclick="runBacktest()">▶ Uruchom Backtest</button>
  </div>

  <!-- RIGHT: Results -->
  <div class="right" id="results">
    <div class="panel">
      <div class="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Ustaw parametry i kliknij <strong style="color:#94a3b8">Uruchom Backtest</strong>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';  // same origin

let equityChart = null;

async function runBacktest() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = 'Ładuję dane...';

  const body = {
    symbol: document.getElementById('symbol').value,
    interval: document.getElementById('interval').value,
    from_dt: document.getElementById('from_dt').value,
    to_dt: document.getElementById('to_dt').value,
    account_size: parseFloat(document.getElementById('account_size').value),
    risk_per_trade: parseFloat(document.getElementById('risk').value),
    min_rr: parseFloat(document.getElementById('min_rr').value),
    max_daily_losses: parseInt(document.getElementById('max_daily_losses').value),
    walk_forward: document.getElementById('walk_forward').value === 'true',
  };

  try {
    const res = await fetch(`${API}/api/v1/backtest/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Błąd serwera');

    renderResults(data, body);
  } catch (e) {
    document.getElementById('results').innerHTML = `
      <div class="panel"><div class="error-box">❌ ${e.message}</div></div>`;
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = '▶ Uruchom Backtest';
  }
}

function renderResults(data, params) {
  const m = data.metrics;
  const trades = data.trades || [];
  const equity = data.equity_curve || [];
  const isWF = !!data.windows;

  if (isWF) { renderWalkForward(data); return; }

  const pnlColor = m.total_pnl >= 0 ? 'green' : 'red';
  const wrColor = m.win_rate >= 45 ? 'green' : m.win_rate >= 35 ? 'yellow' : 'red';
  const pfColor = m.profit_factor >= 1.5 ? 'green' : m.profit_factor >= 1 ? 'yellow' : 'red';
  const ddColor = m.max_drawdown_pct <= 10 ? 'green' : m.max_drawdown_pct <= 20 ? 'yellow' : 'red';

  const benchmarks = [
    { label: 'Win Rate ~50%', target: '~50%', actual: m.win_rate.toFixed(1) + '%', ok: m.win_rate >= 45 },
    { label: 'Min R:R 1:2', target: '≥ 2.0', actual: m.avg_rr.toFixed(2), ok: m.avg_rr >= 2.0 },
    { label: 'Profit Factor > 1.5', target: '> 1.5', actual: m.profit_factor === Infinity ? '∞' : m.profit_factor.toFixed(2), ok: m.profit_factor > 1.5 },
    { label: 'Max Drawdown < 20%', target: '< 20%', actual: m.max_drawdown_pct.toFixed(1) + '%', ok: m.max_drawdown_pct < 20 },
  ];

  document.getElementById('results').innerHTML = `
    <!-- Metrics -->
    <div class="panel">
      <h2>Wyniki — ${params.symbol} ${params.from_dt} → ${params.to_dt}</h2>
      <div class="info-row">
        <span>${m.total_trades} tradów</span>
        <span>${m.trades_per_day.toFixed(1)}/dzień</span>
        <span>Sharpe ${m.sharpe_ratio.toFixed(2)}</span>
        <span>${data.window_start} → ${data.window_end}</span>
      </div>
      <div class="metrics-grid" style="margin-top:16px">
        <div class="metric"><div class="label">Net PnL</div><div class="value ${pnlColor}">$${m.total_pnl.toLocaleString('pl-PL', {minimumFractionDigits:0,maximumFractionDigits:0})}</div><div class="sub">${m.net_pnl_r.toFixed(1)} R total</div></div>
        <div class="metric"><div class="label">Win Rate</div><div class="value ${wrColor}">${m.win_rate.toFixed(1)}%</div><div class="sub">${m.winning_trades}W / ${m.losing_trades}L</div></div>
        <div class="metric"><div class="label">Profit Factor</div><div class="value ${pfColor}">${m.profit_factor === Infinity ? '∞' : m.profit_factor.toFixed(2)}</div><div class="sub">Gross ratio</div></div>
        <div class="metric"><div class="label">Avg R:R</div><div class="value white">${m.avg_rr.toFixed(2)}</div><div class="sub">win ${m.avg_win_r.toFixed(1)}R / loss ${m.avg_loss_r.toFixed(1)}R</div></div>
        <div class="metric"><div class="label">Max Drawdown</div><div class="value ${ddColor}">${m.max_drawdown_pct.toFixed(1)}%</div><div class="sub">od szczytu equity</div></div>
        <div class="metric"><div class="label">Sharpe</div><div class="value white">${m.sharpe_ratio.toFixed(2)}</div><div class="sub">annualized</div></div>
      </div>
    </div>

    <!-- Benchmarks -->
    <div class="panel">
      <h2>Benchmark vs Fabio Valentini</h2>
      ${benchmarks.map(b => `
        <div class="benchmark-row">
          <span>${b.label}</span>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="color:#64748b;font-size:12px">cel: ${b.target}</span>
            <span style="color:#e2e8f0;font-size:13px;font-weight:600">${b.actual}</span>
            <span class="badge ${b.ok ? 'ok' : (m.total_trades === 0 ? 'na' : 'fail')}">${b.ok ? '✓ OK' : (m.total_trades === 0 ? 'N/A' : '✗')}</span>
          </div>
        </div>
      `).join('')}
    </div>

    <!-- Equity Curve -->
    ${equity.length > 0 ? `
    <div class="panel">
      <h2>Equity Curve</h2>
      <div class="chart-wrap"><canvas id="equityCanvas"></canvas></div>
    </div>` : ''}

    <!-- Trades Table -->
    ${trades.length > 0 ? `
    <div class="panel">
      <h2>Lista Tradów (${trades.length})</h2>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Setup</th><th>Dir.</th><th>Entry</th><th>Exit</th>
            <th>PnL ($)</th><th>PnL (R)</th><th>Status</th><th>Sesja</th>
          </tr></thead>
          <tbody>
            ${trades.map(t => `
              <tr>
                <td style="color:#818cf8;font-size:11px">${t.setup_type === 'trend_continuation' ? 'Trend' : 'MeanRev'}</td>
                <td><span class="tag ${t.direction}">${t.direction === 'long' ? '▲ Long' : '▼ Short'}</span></td>
                <td>${t.entry_price.toFixed(2)}</td>
                <td>${t.exit_price ? t.exit_price.toFixed(2) : '-'}</td>
                <td class="${t.pnl >= 0 ? 'green' : 'red'}">$${t.pnl.toFixed(0)}</td>
                <td class="${t.pnl_r >= 0 ? 'green' : 'red'}">${t.pnl_r >= 0 ? '+' : ''}${t.pnl_r.toFixed(2)}R</td>
                <td><span class="tag ${t.status.includes('target') ? 'target' : t.status.includes('stop') ? 'stop' : 'eod'}">${t.status.replace('closed_','').replace('_',' ')}</span></td>
                <td style="color:#64748b">${t.session.toUpperCase()}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>` : `
    <div class="panel">
      <div class="placeholder" style="padding:24px">
        <div style="color:#f59e0b">⚠ Brak tradów w tym okresie</div>
        <div style="margin-top:8px;font-size:13px;color:#64748b">Spróbuj dłuższego okresu lub innych parametrów</div>
      </div>
    </div>`}
  `;

  // Render equity chart
  if (equity.length > 0) {
    setTimeout(() => {
      const ctx = document.getElementById('equityCanvas');
      if (!ctx) return;
      if (equityChart) equityChart.destroy();

      const labels = equity.map((_, i) => `T${i+1}`);
      const values = equity.map(e => e.equity);
      const startVal = params.account_size;

      equityChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Equity',
            data: values,
            borderColor: '#6366f1',
            backgroundColor: 'rgba(99,102,241,0.08)',
            borderWidth: 2,
            pointRadius: values.length > 50 ? 0 : 3,
            fill: true,
            tension: 0.3,
          }, {
            label: 'Start',
            data: labels.map(() => startVal),
            borderColor: '#374151',
            borderWidth: 1,
            borderDash: [4, 4],
            pointRadius: 0,
            fill: false,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { display: false },
            y: {
              grid: { color: '#2d314840' },
              ticks: { color: '#64748b', font: { size: 11 },
                callback: v => '$' + v.toLocaleString('en-US', {maximumFractionDigits:0}) }
            }
          },
        },
      });
    }, 50);
  }
}

function renderWalkForward(data) {
  const agg = data.aggregated;
  document.getElementById('results').innerHTML = `
    <div class="panel">
      <h2>Walk-Forward — ${data.windows} okien</h2>
      <div class="metrics-grid">
        <div class="metric"><div class="label">Łączne Trades</div><div class="value white">${agg.total_trades}</div></div>
        <div class="metric"><div class="label">Avg Win Rate</div><div class="value ${agg.avg_win_rate >= 45 ? 'green' : 'yellow'}">${agg.avg_win_rate}%</div></div>
        <div class="metric"><div class="label">Avg PF</div><div class="value ${agg.avg_profit_factor >= 1.5 ? 'green' : 'yellow'}">${agg.avg_profit_factor.toFixed(2)}</div></div>
        <div class="metric"><div class="label">Total PnL</div><div class="value ${agg.total_pnl >= 0 ? 'green' : 'red'}">$${agg.total_pnl.toLocaleString()}</div></div>
        <div class="metric"><div class="label">Max DD</div><div class="value ${agg.max_drawdown_pct <= 20 ? 'green' : 'red'}">${agg.max_drawdown_pct}%</div></div>
      </div>
    </div>
    <div class="panel">
      <h2>Wyniki per okno</h2>
      <table><thead><tr><th>Okno</th><th>Trades</th><th>Win Rate</th><th>PF</th></tr></thead>
      <tbody>${data.results.map(r => `
        <tr>
          <td style="color:#94a3b8;font-size:11px">${r.window}</td>
          <td>${r.metrics.total_trades}</td>
          <td class="${r.metrics.win_rate >= 45 ? 'green' : 'yellow'}">${r.metrics.win_rate}%</td>
          <td class="${r.metrics.profit_factor >= 1.5 ? 'green' : 'yellow'}">${r.metrics.profit_factor.toFixed ? r.metrics.profit_factor.toFixed(2) : r.metrics.profit_factor}</td>
        </tr>
      `).join('')}</tbody></table>
    </div>`;
}
</script>
</body>
</html>
